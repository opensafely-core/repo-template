---
name: Check uvmirror

permissions:
  contents: read

on:
  push:
  workflow_dispatch:

jobs:
  check-uvmirror:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7.0.0
      - uses: opensafely-core/setup-action@d9171097dd0d37bdb7bed58f701eb03ff317ed17 # v1.7.0
        with:
          install-just: true
          install-uv: true
          cache: uv

      - name: Ensure requirements.uvmirror.txt is consistent with uv.lock
        run: just uvmirror && git diff -s --exit-code
